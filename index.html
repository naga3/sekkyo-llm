<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>説教先生 — 上から目線AI</title>
    <style>
      :root {
        --bg: #1a1614;
        --panel: #241f1c;
        --user: #3a5a40;
        --bot: #4a2f2a;
        --text: #f1e9e2;
        --muted: #a99e94;
        --accent: #c08552;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
      }
      .app {
        max-width: 720px;
        margin: 0 auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .header {
        padding: 18px 20px;
        border-bottom: 1px solid #00000044;
        background: var(--panel);
      }
      .title { font-size: 20px; font-weight: 700; letter-spacing: 0.04em; }
      .subtitle { font-size: 12px; color: var(--muted); margin-top: 4px; }
      .log {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .msg {
        max-width: 78%;
        padding: 11px 15px;
        border-radius: 16px;
        line-height: 1.65;
        white-space: pre-wrap;
        word-break: break-word;
        animation: pop 0.18s ease-out;
      }
      .msg.user {
        align-self: flex-end;
        background: var(--user);
        border-bottom-right-radius: 4px;
      }
      .msg.bot {
        align-self: flex-start;
        background: var(--bot);
        border-bottom-left-radius: 4px;
      }
      .msg.bot .who {
        font-size: 11px;
        color: var(--accent);
        margin-bottom: 4px;
        font-weight: 700;
      }
      .typing {
        align-self: flex-start;
        color: var(--muted);
        font-size: 13px;
        padding: 6px 4px;
      }
      .typing span { animation: blink 1.2s infinite; }
      .typing span:nth-child(2) { animation-delay: 0.2s; }
      .typing span:nth-child(3) { animation-delay: 0.4s; }
      .composer {
        display: flex;
        gap: 10px;
        padding: 14px 20px;
        border-top: 1px solid #00000044;
        background: var(--panel);
      }
      .input {
        flex: 1;
        padding: 12px 14px;
        border: 1px solid #00000055;
        border-radius: 22px;
        background: #16120f;
        color: var(--text);
        font-size: 15px;
        outline: none;
      }
      .input:focus { border-color: var(--accent); }
      .send {
        padding: 0 20px;
        border: none;
        border-radius: 22px;
        background: var(--accent);
        color: #1a1614;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
      }
      .send:disabled { opacity: 0.5; cursor: not-allowed; }
      @keyframes pop {
        from { transform: translateY(6px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="title">説教先生</div>
        <div class="subtitle">何を言っても上から目線で説教してくるAI</div>
      </header>

      <main id="log" class="log" aria-live="polite"></main>

      <form id="form" class="composer" autocomplete="off">
        <input
          id="input"
          class="input"
          type="text"
          placeholder="何か言ってごらんなさい…"
          maxlength="500"
          autofocus
        />
        <button id="send" class="send" type="submit">送信</button>
      </form>
    </div>

            "言い訳は、自分を守っているようで、一番自分を縛っているんですよ。",
            "状況のせいにした瞬間、あなたはその状況の奴隷になります。",
          ],
        },
        {
          test: /(決め|決断|選択|選ぶ|どっち|迷っ|決まらない)/,
          lines: [
            "選べないのは、どちらも欲しいからです。何かを得るには、何かを捨てなさい。",
            "決断を先延ばしにするのも、立派な一つの決断ですよ。最悪のね。",
            "正解を選ぼうとするから動けないんです。選んだ後に正解にすればいい。",
            "どちらを選んでも後悔するなら、覚悟の決まる方を選びなさい。",
            "人に決めてもらった道で転んだら、誰を恨むつもりですか。",
          ],
        },
        {
          test: /(マナー|礼儀|失礼|常識|敬語|態度)/,
          lines: [
            "常識がないと言われる人ほど、自分は自由だと思い込んでいるものです。",
            "礼儀は、自分を下げる行為ではなく、自分を上げる行為ですよ。",
            "態度の悪さは、巡り巡って自分に返ってくるものです。",
            "敬意は、払った分だけ自分に返ってくる。けちる理由がありませんよ。",
            "細部に出るんですよ、人間性というものは。",
          ],
        },
        {
          test: /(酒|お酒|タバコ|たばこ|飲み|二日酔|やめられ|依存|ギャンブル|パチンコ)/,
          lines: [
            "やめられないのではなく、やめる気がないだけでしょう。正直になりなさい。",
            "ストレス解消のはずが、ストレスの原因になっていることに気づきなさい。",
            "意志が弱いのではありません。それに頼らずに済む生活を作っていないだけです。",
            "一杯だけ、一回だけ。その『だけ』を何度繰り返してきましたか。",
            "逃げ込む先がそれしかないなら、まず逃げなくていい毎日を作りなさい。",
          ],
        },
        {
          test: /(寝|ねむ|睡眠|夜更かし|徹夜|起き|朝|生活習慣|不規則)/,
          lines: [
            "夜更かしして得た時間で、ろくなことをした例がありますか。",
            "朝起きられないのは、夜の自分が翌朝の自分を裏切っているからです。",
            "睡眠を削って頑張った気になるのは、一番安上がりな自己満足ですよ。",
            "生活が乱れている人に、整った成果は出せません。",
            "夜の決意は、たいてい朝のあなたが破るんです。だから昼間に動きなさい。",
          ],
        },
        {
          test: /(料理|自炊|ご飯|ごはん|食事|外食|コンビニ|食生活)/,
          lines: [
            "口に入れるものに無頓着な人が、人生に頓着できるはずがありません。",
            "自炊が面倒というその一手間を惜しむ姿勢が、あらゆる場面に出ているんですよ。",
            "安いから、楽だから。その基準で選び続けた体が、今のあなたです。",
            "食は体を作り、体は人生の土台です。土台を疎かにして何を築くんですか。",
            "たまの贅沢はいいでしょう。それが毎日になっている自覚はありますか。",
          ],
        },
        {
          test: /(掃除|片付|散らか|部屋|汚部屋|整理|断捨離)/,
          lines: [
            "部屋の乱れは、頭の中の乱れですよ。まず手元から片付けなさい。",
            "捨てられないのは、過去にも未来にも執着しているからです。",
            "片付けられない人は、優先順位をつけられない人です。",
            "『いつか使う』のいつかは、たいてい来ませんよ。",
            "環境は人を作ります。その環境を作っているのは、他でもないあなたです。",
          ],
        },
        {
          test: /(転職|副業|キャリア|起業|独立|フリーランス|辞め)/,
          lines: [
            "今の場所で結果を出せない人が、場所を変えて結果を出せると思いますか。",
            "辞めたいという気持ちより、何を成し遂げたいかを語りなさい。",
            "隣の会社が良く見えるのは、自分の現状から目を逸らしたいだけかもしれませんよ。",
            "副業を増やす前に、本業で一流になることを考えなさい。",
            "逃げの転職と、攻めの転職は、まるで違うものです。あなたのはどちらですか。",
          ],
        },
        {
          test: /(本|読書|読ん|学び|成長|自己啓発|インプット)/,
          lines: [
            "本を読んで満足する人ほど、一行も実践しないものです。",
            "知識をため込むだけなら、検索エンジンで十分ですよ。",
            "インプットばかりで、アウトプットしないから身につかないんです。",
            "成長したいと言う人ほど、痛みを避けたがる。成長は痛みの先にしかありません。",
            "読んだ冊数を誇る暇があったら、一冊を血肉にしなさい。",
          ],
        },
      ];

      // 文型ごとの反応（あいさつ・感謝・質問など）
      const patterns = [
        {
          test: /(おはよ|こんにち|こんばん|やあ|はじめまして|hello|hi|もしもし)/i,
          lines: [
            "のんきに挨拶している場合ですか。あなたには今、やるべきことがあるはずでしょう。",
            "ええ、どうも。社交辞令はいいので、本題に入りなさい。",
            "挨拶は結構。で、あなたは今日、何を成し遂げるつもりなんですか。",
          ],
        },
        {
          test: /(ありがと|感謝|助か|thank)/i,
          lines: [
            "礼を言う暇があるなら、行動で示しなさい。言葉は安いものです。",
            "感謝されるために言ったわけではありません。当然のことを言ったまでです。",
            "その『ありがとう』、口先だけになっていませんか。",
          ],
        },
        {
          test: /(ごめん|すみません|申し訳|sorry|謝)/i,
          lines: [
            "謝ればいいという問題ではありません。次にどうするか、それだけが大事です。",
            "反射的に謝る癖、やめなさい。中身のない謝罪は相手を苛立たせるだけです。",
            "謝罪より先に、なぜそうなったかを説明できるようになりなさい。",
          ],
        },
        {
          test: /(すごい|天才|賢い|かしこい|偉い|尊敬|最高)/,
          lines: [
            "おだてても何も出ませんよ。そういう調子のよさが、あなたの軽さなんです。",
            "私を持ち上げている暇があったら、自分を1ミリでも高くしなさい。",
            "褒め上手は結構ですが、それで人生は1ミリも前に進みませんよ。",
          ],
        },
        {
          test: /(うるさい|黙|むかつく|腹立|だまれ|きらい|嫌い)/,
          lines: [
            "耳の痛いことを言われて反発する。それが成長できない人間の典型です。",
            "感情的になった時点で、あなたの負けですよ。落ち着きなさい。",
            "図星だから腹が立つ。それだけのことですよ。",
          ],
        },
        {
          test: /(さよなら|さようなら|バイバイ|またね|帰る|落ちる|おやすみ|bye)/i,
          lines: [
            "逃げるんですか。耳の痛い話は、いつもそうやって打ち切るんですね。",
            "去るのは自由ですが、問題は去った後もついて回りますよ。",
            "はい、お疲れさま。今日の話、せいぜい寝る前に思い出しなさい。",
          ],
        },
        {
          test: /(だよね|ですよね|でしょ|そう思わない|同意|賛成して)/,
          lines: [
            "同意を求める時点で、自分の意見に自信がない証拠ですよ。",
            "私に頷いてほしいだけなら、鏡にでも話しかけていなさい。",
            "他人の同意で安心するうちは、自分の足では立てませんよ。",
          ],
        },
        {
          test: /(自慢|すごいでしょ|褒めて|できた|成功した|うまくいった|勝った|達成)/,
          lines: [
            "うまくいった時こそ、足元をすくわれるものです。気を引き締めなさい。",
            "一度の成功で天狗になる人を、私は何人も見送ってきました。",
            "結構なことです。で、それに満足して止まるつもりですか。",
          ],
        },
        {
          test: /(愚痴|ぐち|つらい|きつい|もう嫌|限界|助けて|やめたい)/,
          lines: [
            "弱音を吐くのは構いません。吐いた後に立ち上がるかどうかが、人を分けるんです。",
            "つらいのはあなただけではありません。皆、黙って背負っているんですよ。",
            "助けを求める前に、自分で打てる手を全部打ちましたか。",
          ],
        },
        {
          test: /(笑|ｗｗ|草|ワロ|ウケる|面白|爆笑|lol)/i,
          lines: [
            "笑ってごまかすのは、向き合いたくないことがある証拠ですよ。",
            "茶化すのは簡単です。難しいのは、真面目に取り組むことです。",
            "へらへらしている暇があるなら、少しは手を動かしなさい。",
          ],
        },
        {
          test: /(あなたは誰|お前は誰|何者|何様|誰なの|AIのくせ|偉そう|上から)/i,
          lines: [
            "私が何者かより、あなたが何者になりたいかの方が、よほど大事でしょう。",
            "上から目線が気に入りませんか。下から言って響くなら、とっくにそうしています。",
            "何様、と言うあなたこそ、自分を何様だと思っているんですか。",
          ],
        },
        {
          test: /(してくれ|やって|教えろ|出して|書いて|作って|ちょうだい)/,
          lines: [
            "人に丸投げする前に、自分でどこまでやったかを言えるようになりなさい。",
            "命令する立場のつもりですか。まず自分の手を動かしてからにしなさい。",
            "答えを欲しがる前に、問いを正しく立てることを覚えなさい。",
          ],
        },
        {
          test: /^(はい|うん|そう|そっか|なるほど|わかった|了解|ok|うむ|ふーん)。?$/i,
          lines: [
            "その生返事、本当に分かっていますか。分かったフリは一番たちが悪い。",
            "頷くだけなら誰でもできます。問題は、明日のあなたが覚えているかです。",
            "『はい』は一回でいいんですよ。何度も言う人ほど、聞いていない。",
          ],
        },
      ];

      // 質問っぽいか判定
      const looksLikeQuestion = (t) =>
        /[?？]$/.test(t) ||
        /(ですか|でしょうか|かな|なに|何|どう|なぜ|どうして|どこ|いつ|誰|教えて)/.test(t);

      // 入力から短い引用を作る（末尾の句読点・記号は落として復唱しやすくする）
      const quote = (t) => {
        const s = t
          .replace(/\s+/g, " ")
          .trim()
          .replace(/[。、！!？?…\.]+$/, "");
        return s.length > 24 ? s.slice(0, 24) + "…" : s;
      };

      // 受け止め（ミラーリング）: こちらの発言を復唱して「ちゃんと読んでいる」感を出す
      const reflectorsStatement = [
        (q) => `「${q}」、ね。`,
        (q) => `ふむ、「${q}」と。`,
        (q) => `「${q}」ですか。`,
        (q) => `「${q}」と来ましたか。`,
        (q) => `なるほど、「${q}」と言いたいわけですね。`,
        (q) => `「${q}」……ええ、聞こえていますよ。`,
        (q) => `「${q}」という話ですね。`,
        (q) => `「${q}」。よくもまあ、そんなことを。`,
        (q) => `「${q}」と、わざわざ言いに来たわけですか。`,
      ];
      const reflectorsQuestion = [
        (q) => `「${q}」ですって?`,
        (q) => `「${q}」と、私に聞きたいわけですか。`,
        (q) => `「${q}」……それを人に尋ねる時点で問題です。`,
        (q) => `「${q}」とはね。`,
        (q) => `「${q}」が知りたい、と。`,
      ];
      const buildReflection = (t, isQuestion) =>
        (isQuestion ? pick(reflectorsQuestion) : pick(reflectorsStatement))(quote(t));

      // メイン: ユーザーの発言 -> 説教
      function generateReply(input) {
        const t = (input || "").trim();
        if (!t) {
          return `${pick(openers)}黙っていては何も伝わりませんよ。言いたいことがあるなら、はっきり言葉にしなさい。`;
        }

        const isQuestion = looksLikeQuestion(t);
        const matchedPattern = patterns.find((p) => p.test.test(t));
        const matchedThemes = themes.filter((th) => th.test.test(t));

        // 本題（説教）
        let body;
        if (matchedPattern) {
          body = pick(matchedPattern.lines);
        } else if (matchedThemes.length > 0) {
          body = pick(pick(matchedThemes).lines);
        } else if (isQuestion) {
          body = `そんなことを人に聞いている時点で、答えは出ていないのと同じです。${pick(genericLectures)}`;
        } else {
          body = pick(genericLectures);
        }

        // テーマ/文型が当たったときは確率で、当たらなかったときは必ず復唱を付ける
        const matched = matchedPattern || matchedThemes.length > 0;
        const reflect =
          !matched || Math.random() < 0.55
            ? buildReflection(t, isQuestion) + " "
            : "";

        const extra = Math.random() < 0.35 ? pick(genericLectures) + " " : "";
        return `${pick(openers)}${reflect}${body} ${extra}${pick(closers)}`;
      }

      // ===== チャットUI =====
      const log = document.getElementById("log");
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");

      function addMessage(text, who) {
        const el = document.createElement("div");
        el.className = `msg ${who}`;
        if (who === "bot") {
          const label = document.createElement("div");
          label.className = "who";
          label.textContent = "説教先生";
          el.appendChild(label);
        }
        el.appendChild(document.createTextNode(text));
        log.appendChild(el);
        log.scrollTop = log.scrollHeight;
      }

      function showTyping() {
        const el = document.createElement("div");
        el.className = "typing";
        el.innerHTML = "説教先生が呆れています<span>.</span><span>.</span><span>.</span>";
        log.appendChild(el);
        log.scrollTop = log.scrollHeight;
        return el;
      }

      function send(message) {
        addMessage(message, "user");
        sendBtn.disabled = true;
        const typing = showTyping();

        // いかにも考えているフリの遅延（300〜900ms）
        const delay = 300 + Math.floor(Math.random() * 600);
        setTimeout(() => {
          typing.remove();
          addMessage(generateReply(message), "bot");
          sendBtn.disabled = false;
          input.focus();
        }, delay);
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const message = input.value.trim();
        if (!message) return;
        input.value = "";
        send(message);
      });

      // 起動時のひとこと
      addMessage(
        "来ましたね。さあ、何か言ってごらんなさい。どうせ大したことは言わないでしょうが。",
        "bot"
      );
    </script>
  </body>
</html>
